name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  # Use Node.js 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Use macos-latest (Apple Silicon ARM64)
    # Intel builds can be added later if needed
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install portaudio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create macOS icon (.icns)
        run: |
          # Create iconset directory
          mkdir -p assets/icon.iconset

          # Generate all required icon sizes from PNG
          sips -z 16 16     assets/icon.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out assets/icon.iconset/icon_512x512@2x.png

          # Convert iconset to .icns
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

          # Cleanup
          rm -rf assets/icon.iconset

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm OpenWhisper-macos.spec

      - name: Create DMG
        run: |
          # Create staging directory for DMG contents
          mkdir -p dmg_staging

          # Copy the .app bundle
          cp -r "dist/OpenWhisper.app" dmg_staging/

          # Create symlink to Applications folder
          ln -s /Applications dmg_staging/Applications

          # Create DMG
          hdiutil create -volname "OpenWhisper" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "OpenWhisper-macOS.dmg"

          # Cleanup
          rm -rf dmg_staging

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWhisper-macOS
          path: OpenWhisper-macOS.dmg

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: OpenWhisper-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
