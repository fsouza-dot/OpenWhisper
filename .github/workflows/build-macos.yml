name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # macos-latest is Apple Silicon (arm64).
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install portaudio
        run: brew install portaudio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate .icns
        run: ./scripts/make-icns.sh

      - name: Build .app with PyInstaller
        run: python -m PyInstaller --noconfirm OpenWhisper-macos.spec

      - name: Re-sign with stable bundle identifier
        # PyInstaller's automatic ad-hoc sign fails on libs with xattrs and
        # leaves a random per-build identifier. TCC keys permissions off
        # this identifier, so we strip xattrs and re-sign with the proper
        # com.openwhisper.app identifier.
        run: |
          xattr -cr dist/OpenWhisper.app
          codesign --force --deep --sign - --identifier com.openwhisper.app dist/OpenWhisper.app

      - name: Build DMG
        run: |
          mkdir -p dmg_staging
          cp -R dist/OpenWhisper.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "OpenWhisper" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            OpenWhisper-arm64.dmg
          rm -rf dmg_staging

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWhisper-macOS-arm64
          path: OpenWhisper-arm64.dmg

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: OpenWhisper-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
