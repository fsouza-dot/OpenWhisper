name: Build Linux AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  # Use Node.js 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            portaudio19-dev \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libsecret-1-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libegl1 \
            libfuse2 \
            xdotool

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm OpenWhisper-linux.spec

      - name: Download AppImage tools
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy built application
          cp -r dist/OpenWhisper/* AppDir/usr/bin/

          # Copy icon
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/openwhisper.png
          cp assets/icon.png AppDir/openwhisper.png

          # Create desktop file
          cat > AppDir/usr/share/applications/openwhisper.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=OpenWhisper
          Comment=Local-first dictation assistant
          Exec=OpenWhisper
          Icon=openwhisper
          Categories=Utility;Accessibility;AudioVideo;
          Keywords=dictation;speech;voice;transcription;
          Terminal=false
          StartupNotify=false
          EOF

          # Copy desktop file to AppDir root
          cp AppDir/usr/share/applications/openwhisper.desktop AppDir/

          # Create AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/OpenWhisper" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage AppDir OpenWhisper-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWhisper-Linux-AppImage
          path: OpenWhisper-x86_64.AppImage

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: OpenWhisper-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
